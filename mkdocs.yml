site_name: Apuntes
site_url: https://bpaterna.github.io/apuntes/
site_author: Begoña Paterna
theme:
  name: material
  language: es
  palette:
    scheme: default
    primary: purple
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.instant
    - navigation.top
    - navigation.sections
    - search.highlight
    - search.suggest
    - toc.integrate
nav:
  - 1. Introducción y entorno de desarrollo: kotlin01.md
  - 2. Variables y tipos de datos: kotlin02.md
  - 3. Entrada y salida estándar: kotlin03.md
  - 4. Estructuras de control de flujo: kotlin04.md
  - 5. Funciones: kotlin05.md
  - 6. Estructuras de datos: kotlin06.md
markdown_extensions:
  - attr_list
  - admonition
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed
extra_css:
  - stylesheets/extra.css
use_directory_urls: false
